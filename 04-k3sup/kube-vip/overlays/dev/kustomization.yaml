apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
configMapGenerator:
- name: kubevip
  namespace: kube-system
  # TODO: We should be able to use the VIP range from the dev.env file instead of hardcoding it here.
  literals:
    - range-global=192.168.68.31-192.168.68.34
generatorOptions:
  # By default, kustomize appends a hash to the name of generated ConfigMaps and Secrets.
  # We need the exact name of the ConfigMap to be "kubevip" for the kube-vip DaemonSet to work, so we disable the hash suffix.
  disableNameSuffixHash: true
